<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าเว็บแสดงรูปภาพ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background-color: #f4f4f4;
            text-align: center;
        }
        .container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        img {
            /* ช่วยให้รูปภาพย่อ-ขยายตามหน้าจอมือถือและคอมพิวเตอร์อัตโนมัติ */
            max-width: 100%;
            height: auto;
            border-radius: 4px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>ยินดีต้อนรับสู่เว็บไซต์ของฉัน</h2>
        <p>ด้านล่างนี้คือตัวอย่างการแสดงรูปภาพ:</p>
        
        <img src="https://images.unsplash.com/photo-1514888286974-6c03e2ca1dba" alt="แมวน่ารัก">

        </div>

</body>
</html>
